ktor:
  deployment:
    port: 8080
  application:
    modules:
      - wtf.jobin.KoinKt.configureKoin
      - wtf.jobin.HttpKt.configureHttp
      - wtf.jobin.MonitoringKt.configureMonitoring
      - wtf.jobin.SerializationKt.configureSerialization
      - wtf.jobin.plugins.DatabaseKt.configureDatabase
      - wtf.jobin.plugins.ScannerKt.configureScanner
      - wtf.jobin.SecurityKt.configureSecurity
      - wtf.jobin.WebsocketsKt.configureWebsockets
      - wtf.jobin.SseKt.configureSse
      - wtf.jobin.AutoHeadResponseKt.configureAutoHeadResponse
      - wtf.jobin.RateLimitingKt.configureRateLimiting
      - wtf.jobin.RequestValidationKt.configureRequestValidation
      - wtf.jobin.ServerOpenTelemetryKt.configureOpenTelemetry
      - wtf.jobin.plugins.StatusPagesKt.configureStatusPages
      - wtf.jobin.RoutingKt.configureRouting
      - wtf.jobin.plugins.ApiDocsKt.configureApiDocs
      - wtf.jobin.cluster.AgentBootstrapKt.configureAgent
      - wtf.jobin.plugins.AcquisitionKt.configureAcquisition

viewrr:
  env: "$VIEWRR_ENV:dev"
  role: "$VIEWRR_ROLE:hub"   # hub | agent (Phase 14 #68)
  publicBaseUrl: "$PUBLIC_BASE_URL:http://localhost:8080"
  db:
    # Host Postgres.app on port 5433 — has the paradedb extension installed.
    r2dbcUrl: "$DB_R2DBC_URL:r2dbc:postgresql://localhost:5433/viewrr"
    jdbcUrl: "$DB_JDBC_URL:jdbc:postgresql://localhost:5433/viewrr"
    user: "$DB_USER:postgres"
    password: "$DB_PASSWORD:postgres"
    poolMaxSize: 20
  redis:
    uri: "$REDIS_URI:redis://localhost:6379/0"
  auth:
    jwtSecret: "$JWT_SECRET:change-me-dev-only"
    jwtIssuer: "viewrr"
    jwtAudience: "viewrr-clients"
    jwtRealm: "viewrr"
    accessTtlMinutes: 15
    refreshTtlDays: 30
    oidcIssuer: "$OIDC_ISSUER:"      # Phase 20 #113 — set to Keycloak realm URL to enable RS256
    oidcJwksUrl: "$OIDC_JWKS_URL:"   # .../protocol/openid-connect/certs
    allowedClients: "$AUTH_ALLOWED_CLIENTS:" # #118 — approved frontend client_ids (csv); empty = allow any
  media:
    ffprobePath: "$FFPROBE_PATH:ffprobe"
    ffmpegPath: "$FFMPEG_PATH:ffmpeg"
    hlsRoot: "$HLS_ROOT:/tmp/viewrr-hls"
    downloadsRoot: "$DOWNLOADS_ROOT:/tmp/viewrr-downloads"
    tmdbApiKey: "$TMDB_API_KEY:"
    hlsCacheMaxBytes: "$HLS_CACHE_MAX_BYTES:53687091200"   # Phase 15 #80 — 50 GiB default
    edgeCacheEnabled: "$MEDIA_EDGE_CACHE_ENABLED:false"    # #95 Phase 18 — DEFAULT-OFF; true = push HLS to same-LAN node
    hlsCacheRoot: "$HLS_CACHE_ROOT:/tmp/viewrr-hls-edge"   # #95 — AGENT-side store for pushed bundles
  cors:
    allowedHosts:
      - "localhost:5173"
      - "localhost:3000"
  recs:
    grpcTarget: "$RECS_GRPC_TARGET:localhost:50051"
  scanner:
    fallbackIntervalMinutes: "$SCANNER_FALLBACK_MINUTES:15"
  cluster:
    enrollmentSecret: "$CLUSTER_ENROLLMENT_SECRET:change-me-dev-only"   # Phase 14 #73
  agent:                                                                # Phase 14 #68 (role=agent only)
    hubBaseUrl: "$AGENT_HUB_URL:http://localhost:8080"
    name: "$AGENT_NAME:"
    meshAddress: "$AGENT_MESH_ADDR:"
    clientAddress: "$AGENT_CLIENT_ADDR:"
    tokenFile: "$AGENT_TOKEN_FILE:/tmp/viewrr-agent.json"
    libraryRoots: "$AGENT_LIBRARY_ROOTS:"   # Phase 15 #76 — comma-separated dirs the /raw endpoint may serve
  acquisition:                                                            # Phase 17 #86..#93 (default OFF)
    enabled: "$ACQUISITION_ENABLED:false"   # master switch — false => feature inert, zero regression
    blackholeDir: "$ACQUISITION_BLACKHOLE_DIR:"   # #90 arr drops grabbed .torrent/.magnet here
    downloadDir: "$ACQUISITION_DOWNLOAD_DIR:"     # Downloader working dir for in-flight fetches
    booksDir: "$ACQUISITION_BOOKS_DIR:"           # #93 .epub/.pdf land here (acquire-only, not served)
    torrentRpcUrl: "$ACQUISITION_TORRENT_RPC_URL:"     # configured torrent client RPC (blank => watch-dir glue)
    torrentRpcToken: "$ACQUISITION_TORRENT_RPC_TOKEN:" # token for the RPC client
    # #91 Prowlarr: arr apps drive indexers (Prowlarr aggregates them) and write grabs to the
    # blackhole; viewrr orchestrates the blackhole only — no Prowlarr/indexer client lives here.
