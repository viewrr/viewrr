name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Jib builds + pushes the OCI image straight to GHCR — no Docker daemon,
      # with Gradle build cache + Jib's own base/layer cache.
      - name: Build & push image with Jib
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew :server:jib \
            -Djib.to.image=ghcr.io/${{ github.repository }}:"$VERSION" \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }} \
            --no-daemon

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

      # Trigger a redeploy of the viewrr app on Dokploy — it pulls the image Jib just
      # pushed to GHCR (point the Dokploy app at ghcr.io/${{ github.repository }}:latest).
      - name: Deploy to Dokploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }} # e.g. https://dokploy.example.com (no trailing slash)
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }} # Dokploy profile -> generate API token
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }} # the viewrr application id in Dokploy
        run: |
          set -euo pipefail
          if [ -z "${DOKPLOY_URL:-}" ] || [ -z "${DOKPLOY_API_KEY:-}" ] || [ -z "${DOKPLOY_APP_ID:-}" ]; then
            echo "::error::Set repo secrets DOKPLOY_URL, DOKPLOY_API_KEY, DOKPLOY_APP_ID"
            exit 1
          fi
          echo "Deploying ${GITHUB_REF_NAME} to Dokploy app ${DOKPLOY_APP_ID}…"
          curl -fsS -X POST "${DOKPLOY_URL}/api/application.deploy" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${DOKPLOY_APP_ID}\"}"
          echo "Dokploy deploy triggered."
          # No API key? Give the app a Deploy Webhook in Dokploy and instead run:
          #   curl -fsS -X POST "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}"
