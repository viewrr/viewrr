name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Jib builds + pushes the OCI image straight to GHCR — no Docker daemon,
      # with Gradle build cache + Jib's own base/layer cache.
      - name: Build & push image with Jib
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew :server:jib \
            -Djib.to.image=ghcr.io/${{ github.repository }}:"$VERSION" \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }} \
            --no-daemon

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
