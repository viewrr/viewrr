name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Service containers are provisioned so integration tests can connect
    # (Postgres exposed on 5433 to match application.yaml). Current unit
    # tests use fakes; the services cost nothing when unused.
    services:
      postgres:
        image: paradedb/paradedb:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: viewrr
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests with coverage
        run: ./gradlew :server:test :server:koverXmlReport --no-daemon
        env:
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URI: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret
          VIEWRR_ENV: ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: server/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: server/build/reports/tests/
